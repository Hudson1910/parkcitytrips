{# Park City Trips — /signin redesign 2026-05-20 (Airbnb Luxe direction).
   Same form action + name attrs + CSRF token preserved. #}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <meta name="robots" content="noindex,nofollow">
    <title>Sign in · Rio Transportation</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
    --cream:#faf9f6; --cream-2:#f3efe8;
    --ink:#0e1a2e; --ink-2:#1a2a45; --ink-3:#2c3e5a;
    --neutral-500:#8a8580; --neutral-300:#c8c2b8;
    --gold:#b8945c; --red:#9a3324;
    --serif:'Fraunces',serif; --sans:'Inter',sans-serif;
    --ease-out:cubic-bezier(0.16,1,0.3,1);
}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);font-size:16px;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 50% 30%, rgba(184,148,92,.06), transparent 70%);pointer-events:none;z-index:0;}

.card{position:relative;z-index:1;width:100%;max-width:420px;text-align:center;background:var(--cream);border:1px solid rgba(14,26,46,.08);border-radius:14px;padding:48px 40px 36px;box-shadow:0 24px 64px rgba(14,26,46,.10),0 4px 12px rgba(14,26,46,.06);}
.logo{font-family:var(--serif);font-style:italic;font-weight:400;font-size:26px;color:var(--ink);letter-spacing:-.015em;margin-bottom:6px;}
.sub{font-family:var(--sans);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--neutral-500);margin-bottom:36px;}

.field{margin-bottom:22px;text-align:left;}
.field label{font-family:var(--sans);font-size:11px;font-weight:500;color:var(--neutral-500);letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:8px;}
.field input{width:100%;padding:13px 0;background:transparent;border:0;border-bottom:1px solid rgba(14,26,46,.18);color:var(--ink);font-family:var(--sans);font-size:15.5px;outline:none;border-radius:0;transition:border-bottom-color .3s var(--ease-out);}
.field input:focus{border-bottom-color:var(--ink);}
.field input::placeholder{color:var(--neutral-300);}

.btn{width:100%;padding:15px 28px;background:var(--ink);color:var(--cream);border:none;border-radius:999px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;margin-top:18px;transition:transform .3s var(--ease-out),background .3s var(--ease-out);}
.btn:hover{background:var(--ink-2);transform:translateY(-2px);}

.error{background:rgba(154,51,36,.08);border:1px solid rgba(154,51,36,.25);border-radius:8px;padding:11px 14px;color:var(--red);font-family:var(--sans);font-size:13px;margin-bottom:22px;text-align:left;}
.back{display:inline-block;margin-top:28px;font-family:var(--sans);font-size:13px;color:var(--neutral-500);text-decoration:none;transition:color .3s var(--ease-out);}
.back:hover{color:var(--ink);}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">Rio<em>.</em>Transportation</div>
    <div class="sub">Admin · Sign in</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signin">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
            <label>Email</label>
            <input type="email" name="email" placeholder="your@email.com" required autofocus>
        </div>
        <div class="field">
            <label>PIN</label>
            <input type="password" name="pin" placeholder="••••" required maxlength="128">
        </div>
        <button type="submit" class="btn">Sign in</button>
    </form>
    <a href="/" class="back">← Back to site</a>
</div>
<script defer src="/static/no-zoom.js?v=2"></script>
</body>
</html>
