      <stop offset="100%" style="stop-color:#e8c65a"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a2035"/>
